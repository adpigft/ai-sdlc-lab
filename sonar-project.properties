# Placeholder SonarCloud configuration for the AI SDLC lab.
# Replace organization, project key, source paths, and coverage paths when application code is introduced.

sonar.organization=example-bank-placeholder
sonar.projectKey=example-bank_ai-sdlc-lab
sonar.projectName=AI SDLC Lab

# Application code is intentionally absent at this stage.
# Keep documentation and governance artifacts visible while excluding generated or irrelevant folders.
sonar.sources=.
sonar.exclusions=\
  .git/**,\
  .github/**,\
  **/*.png,\
  **/*.jpg,\
  **/*.jpeg,\
  **/*.gif,\
  **/*.pdf

sonar.sourceEncoding=UTF-8

