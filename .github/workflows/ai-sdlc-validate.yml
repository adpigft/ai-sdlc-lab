name: AI SDLC Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate workflow state, artifacts, contracts, traceability, and Java
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate workflow state
        shell: bash
        run: scripts/validate-workflow-state.sh

      - name: Validate workflow consistency
        shell: bash
        run: scripts/validate-workflow-consistency.sh

      - name: Validate required artifacts
        shell: bash
        run: scripts/validate-artifacts.sh

      - name: Validate traceability
        shell: bash
        run: scripts/validate-traceability.sh

      - name: Validate release readiness
        shell: bash
        run: scripts/validate-release-readiness.sh

      - name: Validate OpenAPI contracts
        shell: bash
        run: scripts/validate-openapi.sh

      - name: Validate Java
        shell: bash
        run: scripts/validate-java.sh
