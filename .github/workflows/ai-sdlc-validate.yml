name: AI SDLC Artifact Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-ai-sdlc-artifacts:
    name: Validate required AI SDLC artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required artifacts exist and are not empty
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "domains/payments/capabilities/khqr-payment/intent/intent.md"
            "domains/payments/capabilities/khqr-payment/specs/spec.md"
            "domains/payments/capabilities/khqr-payment/context/context.md"
            "domains/payments/capabilities/khqr-payment/contracts/openapi.yaml"
            "domains/payments/capabilities/khqr-payment/tests/acceptance.feature"
            "traceability/traceability-matrix.md"
            "feedback/feedback-log.md"
            "domains/payments/capabilities/khqr-payment/validation/validation-report.md"
            "domains/payments/capabilities/khqr-payment/release/release-notes.md"
          )

          missing_or_empty=0

          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "::error file=$file::Required AI SDLC artifact is missing or empty"
              missing_or_empty=1
            else
              echo "OK: $file"
            fi
          done

          if [[ "$missing_or_empty" -ne 0 ]]; then
            echo "AI SDLC artifact validation failed."
            exit 1
          fi

          echo "AI SDLC artifact validation passed."

      - name: Check governance placeholders
        shell: bash
        run: |
          set -euo pipefail

          grep -q "JIRA-KHQR-" traceability/traceability-matrix.md
          grep -q "CONF-PAY-KHQR-" traceability/traceability-matrix.md
          grep -q "Human Approval" domains/payments/capabilities/khqr-payment/intent/intent.md
          grep -q "Human Approval" domains/payments/capabilities/khqr-payment/specs/spec.md
          grep -q "Human Approval" domains/payments/capabilities/khqr-payment/validation/validation-report.md
          grep -q "Human Approval" domains/payments/capabilities/khqr-payment/release/release-notes.md

          echo "Governance placeholders are present."
