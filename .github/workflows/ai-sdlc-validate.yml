name: AI SDLC Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate workflow state, artifacts, contracts, traceability, Java, and Sonar
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate workflow state
        shell: bash
        run: scripts/validate-workflow-state.sh

      - name: Validate workflow consistency
        shell: bash
        run: scripts/validate-workflow-consistency.sh

      - name: Validate required artifacts
        shell: bash
        run: scripts/validate-artifacts.sh

      - name: Validate traceability
        shell: bash
        run: scripts/validate-traceability.sh

      - name: Validate release readiness
        shell: bash
        run: scripts/validate-release-readiness.sh

      - name: Validate OpenAPI contracts
        shell: bash
        run: scripts/validate-openapi.sh

      - name: Validate Java
        shell: bash
        run: scripts/validate-java.sh

      - name: Detect Sonar configuration
        id: sonar-config
        shell: bash
        run: |
          if [[ -f sonar-project.properties ]] && ! grep -Eq 'example-bank-placeholder|placeholder' sonar-project.properties; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sonar scan
        if: steps.sonar-config.outputs.configured == 'true' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar quality gate
        if: steps.sonar-config.outputs.configured == 'true' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar not configured for this run
        if: steps.sonar-config.outputs.configured != 'true' || env.SONAR_TOKEN == ''
        shell: bash
        run: |
          echo "Sonar scan skipped because sonar-project.properties is placeholder/unavailable or SONAR_TOKEN is unavailable."
