# Codex enterprise integration placeholders.
#
# This file documents optional MCP integrations for enterprise collaboration.
# Do not place tokens, passwords, client secrets, or private URLs in this file.
# Configure secrets through environment variables in the local shell, developer
# environment, or approved enterprise secret manager.

[project]
name = "ai-sdlc-lab"
purpose = "AI SDLC governance lab for banking and digital payments"

[governance]
git_source_of_truth = true
github_actions_ci_record = true
mcp_optional = true

# Optional Jira MCP placeholder.
# Enable only in an enterprise environment with approved credentials.
[mcp_servers.jira]
enabled = false
command = "jira-mcp-server"
args = []

[mcp_servers.jira.env]
JIRA_BASE_URL = "${JIRA_BASE_URL}"
JIRA_EMAIL = "${JIRA_EMAIL}"
JIRA_API_TOKEN = "${JIRA_API_TOKEN}"

# Optional Confluence MCP placeholder.
# Confluence is for collaboration and publication, not the canonical source of truth.
[mcp_servers.confluence]
enabled = false
command = "confluence-mcp-server"
args = []

[mcp_servers.confluence.env]
CONFLUENCE_BASE_URL = "${CONFLUENCE_BASE_URL}"
CONFLUENCE_EMAIL = "${CONFLUENCE_EMAIL}"
CONFLUENCE_API_TOKEN = "${CONFLUENCE_API_TOKEN}"

# Optional GitHub MCP placeholder.
# GitHub MCP may assist with PRs/issues, but GitHub Actions remains the CI gate record.
[mcp_servers.github]
enabled = false
command = "github-mcp-server"
args = []

[mcp_servers.github.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"
GITHUB_OWNER = "${GITHUB_OWNER}"
GITHUB_REPO = "${GITHUB_REPO}"
